<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Us - Whitewater Rafting</title>
  <meta name="description" content="Contact Whitewater Rafting for questions, reservations, or website feedback." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <a href="index.html" aria-label="Whitewater Rafting Home">
      <img src="images/logo.png" alt="Whitewater Rafting Logo" width="150" />
    </a>
    <h1>Whitewater Rafting Adventures</h1>
    <nav aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html" aria-current="page">Contact</a>
    </nav>
  </header>

  <!-- Main Content -->
  <main>

    <!-- Company Info -->
    <section id="company-info">
      <h2>Contact Information</h2>
      <address>
        Plot 4, Adejumo Layout, Ibadan, Oyo State<br />
        Phone: <a href="tel:+2348100864037">+234 810 086 4037</a><br />
        Email: <a href="mailto:Pauloben74@gmail.com">Pauloben74@gmail.com</a>
      </address>

      <!-- Embedded Google Map -->
      <div id="map-container">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3960.333629657722!2d3.9160515152938026!3d7.429502494664493!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x103b85f3f17bbddf%3A0x83952a52c97e5a90!2sAdejumo%20Layout%2C%20Ibadan!5e0!3m2!1sen!2sng!4v1691572165616!5m2!1sen!2sng"
          width="600"
          height="450"
          style="border:none;"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          title="Adejumo Layout, Ibadan, Oyo State Google Map"
        ></iframe>
      </div>
    </section>

    <!-- Employee Profile -->
    <section id="employees">
      <h2>Meet Our Team</h2>
      <figure>
        <img src="images/employee1.jpg" alt="Paul Oben, Lead Guide" />
        <figcaption>Paul Oben - Lead Guide</figcaption>
      </figure>
    </section>

    <!-- Contact Form -->
    <section id="contact-form">
      <h2>Send Us a Message</h2>
      <form action="#" method="post">
        <label for="name">Name:</label>
        <input id="name" name="name" type="text" required />

        <label for="email">Email:</label>
        <input id="email" name="email" type="email" required />

        <fieldset>
          <legend>Purpose of your message</legend>
          <label>
            <input type="radio" name="purpose" value="general" required />
            General Inquiry
          </label>
          <label>
            <input type="radio" name="purpose" value="reservation" />
            Reservation Question
          </label>
          <label>
            <input type="radio" name="purpose" value="suggestion" />
            Website Suggestion
          </label>
        </fieldset>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <label>
          <input type="checkbox" name="subscribe" />
          Please subscribe me to the monthly newsletter
        </label>

        <button type="submit">Send Message</button>
      </form>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <p>© 2025 Whitewater Rafting Adventures | Paul Benson Ikechukwu</p>
    <nav class="socialmedia" aria-label="Social media links">
      <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
        <img src="images/facebook.png" alt="Facebook logo" />
      </a>
      <a href="https://twitter.com" target="_blank" rel="noopener noreferrer" aria-label="Twitter">
        <img src="images/twitter.png" alt="Twitter logo" />
      </a>
      <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <img src="images/instagram.png" alt="Instagram logo" />
      </a>
    </nav>
  </footer>

</body>
</html>
